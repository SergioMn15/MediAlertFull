<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediAlert - Mis Citas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div id="toast-container" class="toast-container"></div>

  <div class="app-container">
    <header id="header-container"></header>

    <div class="patient-layout">
      <div id="sidebar-container"></div>

      <main class="main-content">
        <div class="content-header">
          <div>
            <h2>Mis Citas</h2>
            <p>Consulta tus solicitudes y citas aprobadas.</p>
          </div>
        </div>

        <section class="dashboard-grid">
          <div class="stack">
            <section>
              <div class="content-header">
                <div>
                  <h2>Solicitudes enviadas</h2>
                  <p>Estado de revision por parte del doctor.</p>
                </div>
              </div>
              <div id="appointment-request-list" class="appointment-list"></div>
            </section>
          </div>

          <div class="stack">
            <section>
              <div class="content-header">
                <div>
                  <h2>Citas confirmadas</h2>
                  <p>Consultas ya autorizadas.</p>
                </div>
              </div>
              <div id="appointment-list" class="appointment-list"></div>
            </section>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/patient.js"></script>
</body>
</html>
