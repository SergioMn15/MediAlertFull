<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediAlert - Solicitar Nueva Receta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div id="toast-container" class="toast-container"></div>

  <div class="app-container">
    <header id="header-container"></header>

    <div class="patient-layout">
      <div id="sidebar-container"></div>

      <main class="main-content">
        <div class="content-header">
          <div>
            <h2>Solicitar Nueva Receta</h2>
            <p>Describe tus síntomas actuales o el motivo. Tu doctor revisará y emitirá nueva receta medica.</p>
          </div>
        </div>

        <section class="form-card">
          <form id="recipe-request-form">
            <div class="form-group">
              <label for="symptoms-input">
                <i class="fa-solid fa-syringe"></i>
                Síntomas actuales
              </label>
              <textarea id="symptoms-input" rows="4" placeholder="Ej: Dolor de cabeza persistente, presion arterial alta, falta de aire al caminar 200 metros..."></textarea>
            </div>
            <div class="form-group">
              <label for="notes-input">
                <i class="fa-solid fa-notes-medical"></i>
                Motivo adicional o notas
              </label>
              <textarea id="notes-input" rows="3" placeholder="Ej: Termine medicamento X ayer, necesito reabastecimiento. O cambio de tratamiento."></textarea>
            </div>
            <div id="recipe-request-result" class="form-message"></div>
            <button type="submit" class="btn btn-primary btn-large">
              <i class="fa-solid fa-paper-plane"></i>
              Enviar solicitud al doctor
            </button>
          </form>
        </section>

        <div class="info-card">
          <i class="fa-solid fa-info-circle"></i>
          <p>Tu doctor recibirá notificación inmediata. Verifica en "Mis Recetas" el estado de aprobación.</p>
        </div>
      </main>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/patient.js"></script>
</body>
</html>
